diff --git a/apps/web/src/app/globals.css b/apps/web/src/app/globals.css
new file mode 100644
index 0000000..1dfc649
--- /dev/null
@@ -0,0 +1,35 @@
+:root {
+  color-scheme: light;
+  --bg: #f7f7f4;
+  --surface: #ffffff;
+  --text: #171717;
+  --muted: #6b7280;
+  --border: #e5e7eb;
+  --accent: #14b8a6;
+}
+
+* { box-sizing: border-box; }
+html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
+a { color: inherit; text-decoration: none; }
+button, input, textarea { font: inherit; }
+
+.shell { max-width: 1120px; margin: 0 auto; padding: 28px 20px 56px; }
+.nav { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 32px; }
+.nav-links { display: flex; align-items: center; gap: 14px; color: var(--muted); font-size: 14px; }
+.brand { display: flex; align-items: center; gap: 10px; font-weight: 800; letter-spacing: -0.03em; }
+.brand-mark { width: 34px; height: 34px; border-radius: 12px; background: var(--accent); display: grid; place-items: center; color: white; }
+.hero { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr); gap: 24px; align-items: stretch; }
+.card { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 24px; box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08); }
+.eyebrow { color: var(--accent); font-weight: 700; margin: 0 0 10px; }
+h1 { font-size: clamp(42px, 8vw, 78px); line-height: 0.92; letter-spacing: -0.07em; margin: 0 0 18px; }
+h2 { font-size: 28px; letter-spacing: -0.04em; margin: 0 0 12px; }
+p { color: var(--muted); line-height: 1.7; }
+.cta-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
+.button { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 12px 18px; border: 1px solid var(--border); background: white; font-weight: 700; }
+.button.primary { background: var(--text); color: white; border-color: var(--text); }
+.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
+.meta { font-size: 13px; color: var(--muted); }
+.badge { display: inline-flex; border-radius: 999px; padding: 6px 10px; background: #e6fffb; color: #0f766e; font-size: 12px; font-weight: 800; }
+.form { display: grid; gap: 12px; }
+.input { width: 100%; border: 1px solid var(--border); border-radius: 16px; padding: 12px 14px; background: white; }
+@media (max-width: 780px) { .hero { grid-template-columns: 1fr; } .nav { align-items: flex-start; flex-direction: column; } }
