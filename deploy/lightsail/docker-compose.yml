services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zizilia
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: deploy/lightsail/api.Dockerfile
    env_file: ../../.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres

volumes:
  postgres-data:
