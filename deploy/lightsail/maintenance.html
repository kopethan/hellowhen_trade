<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hellowhen is temporarily unavailable</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #020617;
      color: #f8fafc;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(92vw, 440px);
      padding: 24px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.96);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    }
    .badge {
      color: #67e8f9;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 { margin: 10px 0 12px; font-size: 28px; line-height: 1.1; }
    p { margin: 0; color: #cbd5e1; line-height: 1.6; }
    a {
      display: inline-flex;
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 999px;
      background: #f8fafc;
      color: #020617;
      text-decoration: none;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">Temporary issue</div>
    <h1>Hellowhen is updating</h1>
    <p>The beta server is temporarily unavailable. Please retry in a moment. If this keeps happening, contact support from the app after it comes back online.</p>
    <a href="/">Retry</a>
  </main>
</body>
</html>
